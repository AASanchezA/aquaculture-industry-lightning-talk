name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Adjust this if your primary branch is different (e.g., 'master')

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use a stable Node version

      - name: Install dependencies
        run: |
          npm install -g reveal-md
          # If you have local npm dependencies in the future, run 'npm install'

      - name: Build static presentation
        run: |
          npx reveal-md slides.md --static dist

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        permissions:
          contents: write
        with:
          branch: gh-pages # The branch the action will deploy to
          folder: dist # The folder that the build step outputs to
